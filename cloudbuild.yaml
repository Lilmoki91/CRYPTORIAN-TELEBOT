# Fail konfigurasi Cloud Build untuk deployment ke Cloud Run.

# Pemboleh ubah: Tukar 'cryptorian-telebot' jika nama perkhidmatan anda berbeza.
# Gantikan 'asia-southeast1' jika rantau Cloud Run anda berbeza.
substitutions:
  _SERVICE_NAME: cryptorian-telebot
  _REGION: asia-southeast1

steps:
# Langkah 1: Bina imej Docker
- name: 'gcr.io/cloud-builders/docker'
  id: Build
  args:
    - 'build'
    - '-t'
    - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE_NAME}/$_SERVICE_NAME:$COMMIT_SHA'
    - '.'

# Langkah 2: Tolak imej ke Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  id: Push
  args:
    - 'push'
    - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE_NAME}/$_SERVICE_NAME:$COMMIT_SHA'

# Langkah 3: Deploy ke Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: Deploy
  args:
    - 'run'
    - 'deploy'
    - '${_SERVICE_NAME}'
    - '--image'
    - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE_NAME}/$_SERVICE_NAME:$COMMIT_SHA'
    - '--region'
    - '${_REGION}'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--port'
    - '8080' # Port standard untuk Cloud Run (Pastikan bot anda mendengar pada port 8080)

# Blok ini menyelesaikan ralat 'invalid argument' di rantau baru.
options:
  logging: CLOUD_LOGGING_ONLY
