# Cloud Build YAML file untuk membina kontena dan menggerakkannya ke Cloud Run
steps:
# Langkah 1: Bina imej Docker
- name: 'gcr.io/cloud-builders/docker'
  id: Build
  args:
  - 'build'
  - '--no-cache'  # Sentiasa bina tanpa cache untuk memastikan kod terbaharu
  - '-t'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - '.'

# Langkah 2: Tolak imej ke Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  id: Push
  args:
  - 'push'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Langkah 3: Gerakkan imej ke Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: Deploy
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--quiet'
  env:
  - 'PROJECT_ID=$PROJECT_ID'
  - '_SERVICE_NAME=${_SERVICE_NAME}'

# Tetapan Log untuk Region asia-southeast1 (Wajib untuk rantau baru)
options:
  logging: CLOUD_LOGGING_ONLY

# Pemboleh ubah gantian lalai
substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: cryptorian-telebotoptions:
  logging: CLOUD_LOGGING_ONLY
