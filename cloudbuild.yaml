steps:
# 1. Bina Imej Docker dari Dockerfile
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/cryptorian-telebot', '.']

# 2. Tolak Imej ke Google Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/cryptorian-telebot']

# 3. Deploy Imej ke Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args: [
    'run', 'deploy', 'cryptorian-telebot-service', # Nama Perkhidmatan Cloud Run
    '--image', 'gcr.io/$PROJECT_ID/cryptorian-telebot',
    '--region', 'asia-southeast1', # Pilihan Lokasi Anda
    '--platform', 'managed',
    '--allow-unauthenticated', 
    # PENTING: Ambil Token dari Secret Manager
    '--set-env-vars', 'TELEGRAM_BOT_TOKEN=projects/$PROJECT_ID/secrets/TELEGRAM_BOT_TOKEN/versions/latest' 
  ]
timeout: '1600s'

