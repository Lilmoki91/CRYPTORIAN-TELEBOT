# Ini adalah WorkFlow GitHub Actions yang telah diperbetulkan
# Ia akan membina (build) imej Docker, menolaknya (push) ke Artifact Registry,
# dan menyebarkannya (deploy) ke Cloud Run apabila commit ditolak ke cawangan 'main'.

name: 'Build and Deploy to Cloud Run (CRYPTONIAN-TELEBOT)'

on:
  push:
    branches:
      - 'main' # Pastikan cawangan ini adalah cawangan utama anda

env:
  # MAKLUMAT PROJEK ANDA YANG TELAH DISAHKAN:
  PROJECT_ID: 'worldcoin-helper-ai' # ID Projek Google Cloud anda
  REGION: 'asia-southeast1' # Rantau Cloud Run anda (Singapore)
  SERVICE: 'worldcoin-helper-ai' # Nama Perkhidmatan Cloud Run anda
  
  # TODO: Sila kemas kini ini dengan Workload Identity Provider anda.
  # Jika anda tidak menggunakan WIF, anda mungkin perlu menggunakan JSON key.
  WORKLOAD_IDENTITY_PROVIDER: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider' 

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write' # Diperlukan untuk Google Workload Identity

    steps:
      - name: 'Checkout Code'
        uses: 'actions/checkout@v4'

      # Langkah 1: Authenticate ke Google Cloud menggunakan Workload Identity
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          # Berikan peranan yang diperlukan kepada Workload Identity anda di Google Cloud:
          # - Artifact Registry Administrator (roles/artifactregistry.admin)
          # - Cloud Run Developer (roles/run.developer)
          # - Secret Manager Secret Accessor (roles/secretmanager.secretAccessor)

      # Langkah 2: Konfigurasi Docker Auth
      - name: 'Docker Auth'
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}'

      # Langkah 3: Bina dan Push Container ke Artifact Registry
      - name: 'Build and Push Container'
        run: |-
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/cloudrun/${{ env.SERVICE }}:${{ github.sha }}"
          docker build --tag "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"

      # Langkah 4: Deploy ke Cloud Run
      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/cloudrun/${{ env.SERVICE }}:${{ github.sha }}'
          # PENTING: Menetapkan pembolehubah rahsia
          secret: 'TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest' # Mengambil token dari Secret Manager

      # Langkah 5: Tunjukkan output (URL)
      - name: 'Show output'
        run: |
          echo "Deployment berjaya! URL: ${{ steps.deploy.outputs.url }}"
